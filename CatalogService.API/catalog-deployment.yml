apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogservice-deploy
  labels:
    app: catalogservice-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogservice-pod  
  template:
    metadata:
      labels:
        app: catalogservice-pod
    spec:
      imagePullSecrets:
        - name: acr-secret
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"  
      containers:
        - name: catalogservice-container
          image: catalogservice:latest
          imagePullPolicy: Always
          resources: {}
          env:
            - name: DB_CONNECTION
              value: "Server=tcp:eshopflix-dbserver.database.windows.net,1433;Initial Catalog=eshopflix-catalogdb;Persist Security Info=False;User ID=scholaradmin;Password=Scholar@12345678;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
            - name: IMAGE_SERVER
              value: "http://eshopflixstorage100.azurewebsites.net"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: catalogservice
spec:
  selector:
    app: catalogservice-pod
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
