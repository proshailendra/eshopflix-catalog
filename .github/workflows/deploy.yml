name: CI/CD to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: eshopflix
  IMAGE_NAME: catalogservice

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        az acr login --name $ACR_NAME

    - name: Build Docker Image
      run: |
        docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} .

    - name: Push Docker Image
      run: |
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

    - name: Set AKS Context
      run: |
        az aks get-credentials \
          --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
          --name ${{ secrets.AKS_CLUSTER_NAME }}
          
    - name: Update Deployment Manifest
      run: |
        sed -i \
          "s|catalogservice:latest|$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}|g" \
          CatalogService.API/catalog-deployment.yml

        cat CatalogService.API/catalog-deployment.yml
        
    - name: Deploy to AKS
      run: |
        kubectl set image deployment/dotnet-app \
        dotnet-app=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
